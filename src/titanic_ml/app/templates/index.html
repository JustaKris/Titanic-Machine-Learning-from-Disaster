<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Predictor</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>
    <div class="login">
        <h1>Titanic Survival Predictor</h1>
        <p class="subtitle">Would you have survived the voyage?</p>
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <legend>Fill in passenger details to predict survival</legend>
            <div class="prefill-section">
                <p class="prefill-label">Quick Test</p>
                <div class="prefill-buttons">
                    <button type="button" class="prefill-btn" onclick="prefillCharacter('jack')">🎬 Try with Jack</button>
                    <button type="button" class="prefill-btn" onclick="prefillCharacter('rose')">🎬 Try with Rose</button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input class="form-control" type="number" name="age" placeholder="Enter passenger age" min="0" max="100" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required onclick="removePlaceholderOption(this)">
                    <option class="placeholder" selected disabled value="">Select gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Title</label>
                <select class="form-control" name="name_title" required>
                    <option class="placeholder" selected disabled value="">Select title</option>
                    <option value="Mr">Mr</option>
                    <option value="Miss">Miss</option>
                    <option value="Mrs">Mrs</option>
                    <option value="Master">Master</option>
                    <option value="Dr">Dr</option>
                    <option value="Rev">Reverend</option>
                    <option value="Major">Major</option>
                    <option value="Col">Colonel</option>
                    <option value="The Countess">The Countess</option>
                    <option value="Ms">Ms</option>
                    <option value="Sir">Sir</option>
                    <option value="Lady">Lady</option>
                    <option value="Don">Don</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Siblings / Spouses Aboard</label>
                <select class="form-control" name="sibsp" required>
                    <option class="placeholder" selected disabled value="">Select count</option>
                    <option value="0">None</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Ticket Class</label>
                <select class="form-control" name="pclass" required>
                    <option class="placeholder" selected disabled value="">Select class</option>
                    <option value="1">1st Class</option>
                    <option value="2">2nd Class</option>
                    <option value="3">3rd Class</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Port of Embarkation</label>
                <select class="form-control" name="embarked" required>
                    <option class="placeholder" selected disabled value="">Select port</option>
                    <option value="C">Cherbourg</option>
                    <option value="Q">Queenstown</option>
                    <option value="S">Southampton</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Cabin Occupancy</label>
                <select class="form-control" name="cabin_multiple" required>
                    <option class="placeholder" selected disabled value="">Select occupancy</option>
                    <option value="0">Single</option>
                    <option value="1">Double</option>
                    <option value="2">Triple</option>
                    <option value="3">Quadruple</option>
                </select>
            </div>
            <div class="mb-3">
                <input class="btn btn-primary" type="submit" value="Predict Survival" />
            </div>
        </form>
        <div class="divider"></div>
        <div class="footer-links">
            <button class="link-button" onclick="window.open('https://github.com/JustaKris/Titanic-Machine-Learning-from-Disaster', '_blank')">📂 Repository</button>
            <span class="link-separator">·</span>
            <button class="link-button" onclick="window.open('https://github.com/JustaKris/Titanic-Machine-Learning-from-Disaster/blob/main/notebooks/Titanic-Machine-Learning-from-Disaster.ipynb', '_blank')">📓 Research Notebook</button>
        </div>
        <p class="tech-badge">ML Ensemble · Flask · Scikit-learn · XGBoost · CatBoost</p>
    </div>
</body>
</html>
